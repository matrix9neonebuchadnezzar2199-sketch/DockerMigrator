<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --heading: #cbd5e1;
  --accent: #a78bfa;
  --accent-deep: #7c3aed;
  --border: #334155;
  --code-bg: #0b1220;
  --ok: #34d399;
  --warn: #fbbf24;
  --err: #f87171;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body.doc {
  margin: 0 auto;
  padding: 40px 20px 80px;
  max-width: 960px;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  font-size: 15px;
  line-height: 1.7;
}
body.doc > header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
body.doc > header h1 {
  margin: 0 0 6px;
  font-size: 26px;
  color: var(--accent);
  font-weight: 600;
}
body.doc > header .subtitle {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}
a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed transparent; }
a:hover { border-bottom-color: var(--accent); }
strong { color: var(--heading); font-weight: 600; }
.doc-toc {
  margin-bottom: 28px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.doc-toc h2 {
  margin: 0 0 12px;
  font-size: 14px;
  color: var(--heading);
  letter-spacing: 0.3px;
  text-transform: uppercase;
  font-weight: 600;
}
.doc-toc ul { margin: 0; padding-left: 20px; }
.doc-toc li { margin: 6px 0; }
section {
  margin: 28px 0;
  padding: 20px 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
}
section h2 {
  margin: 0 0 14px;
  font-size: 20px;
  color: var(--accent);
  font-weight: 600;
}
section h3 {
  margin: 20px 0 8px;
  font-size: 13px;
  color: var(--heading);
  letter-spacing: 0.3px;
  text-transform: uppercase;
  font-weight: 600;
}
section h3:first-of-type { margin-top: 0; }
section p { margin: 8px 0; }
section ul, section ol { margin: 8px 0; padding-left: 22px; }
section li { margin: 4px 0; }
.callout {
  margin: 12px 0;
  padding: 12px 14px;
  border-left: 3px solid var(--warn);
  background: rgba(251, 191, 36, 0.08);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
}
.callout strong { color: var(--warn); }
.tag {
  display: inline-block;
  padding: 2px 8px;
  font-size: 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  font-weight: 500;
  white-space: nowrap;
}
.tag-scope { border-color: var(--accent); color: var(--accent); }
.tag-ok { border-color: var(--ok); color: var(--ok); }
.tag-warn { border-color: var(--warn); color: var(--warn); }
code {
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: ui-monospace, Consolas, monospace;
  font-size: 13px;
  color: var(--heading);
}
pre {
  background: var(--code-bg);
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  margin: 12px 0;
  overflow-x: auto;
  font-family: ui-monospace, Consolas, monospace;
  font-size: 13px;
  line-height: 1.6;
}
pre code { background: transparent; padding: 0; }
table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 14px;
}
th {
  text-align: left;
  padding: 8px 10px;
  color: var(--muted);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
.checklist { list-style: none; padding-left: 0; }
.checklist li { margin: 6px 0; }
.checklist label { cursor: pointer; display: flex; gap: 8px; align-items: flex-start; }
.checklist input { margin-top: 4px; accent-color: var(--accent); }
.scenario-id {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.05em;
}
footer.doc-footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--muted);
}
</style>
</head>
<body class="doc">
<!-- CONTENT -->
</body>
</html>
